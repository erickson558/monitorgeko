name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f VERSION ]]; then
            echo "ERROR: VERSION file not found"
            exit 1
          fi

          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION must match vX.Y.Z, found: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Check Existing Tag
        id: tag_check
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION already exists. Skipping tag and release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION does not exist yet."
          fi

      - name: Create And Push Tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Build Release Notes From Changelog
        if: steps.tag_check.outputs.exists == 'false'
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="release_notes.md"

          if [[ -f CHANGELOG.md ]]; then
            awk -v version="$VERSION" '
              BEGIN { capture=0 }
              $0 ~ "^## \\[" version "\\]" { capture=1; print; next }
              capture == 1 && $0 ~ "^## \\[" { exit }
              capture == 1 { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi

          if [[ ! -s "$NOTES_FILE" ]]; then
            {
              echo "## $VERSION"
              echo
              echo "Automated release generated from VERSION on push to main."
            } > "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          generate_release_notes: true
